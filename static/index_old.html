<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ShopKey — Sản phẩm số</title>
  <meta name="description" content="Mua tài khoản, key, gift card và các sản phẩm số uy tín, giá rẻ" />
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🔑</text></svg>" />
  <link rel="stylesheet" href="/static/styles.css?v={{ css_hash }}" />
</head>
<body>
  <!-- Header -->
  <header class="header" id="header">
    <div class="header-inner">
      <a href="#/" class="logo" id="logo-link">
        <span class="logo-icon">🔑</span>
        <span class="logo-text">ShopKey</span>
      </a>

      <div class="header-search">
        <input type="text" id="search-input" placeholder="Tìm sản phẩm..." autocomplete="off" />
        <button id="search-btn" aria-label="Tìm kiếm">
          <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
        </button>
      </div>

      <nav class="header-nav">
        <a href="#/orders" class="nav-link" id="nav-orders">
          <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M6 2 3 6v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2V6l-3-4z"/><line x1="3" y1="6" x2="21" y2="6"/><path d="M16 10a4 4 0 0 1-8 0"/></svg>
          <span>Đơn hàng</span>
        </a>
        <a href="#/cart" class="nav-link nav-cart" id="nav-cart">
          <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="9" cy="21" r="1"/><circle cx="20" cy="21" r="1"/><path d="M1 1h4l2.68 13.39a2 2 0 0 0 2 1.61h9.72a2 2 0 0 0 2-1.61L23 6H6"/></svg>
          <span class="cart-count" id="cart-count">0</span>
        </a>
        <div class="user-menu" id="user-menu">
          <button class="btn-icon" id="user-menu-btn" aria-label="Tài khoản">
            <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
          </button>
          <div class="user-dropdown" id="user-dropdown">
            <div class="dropdown-user-info" id="dropdown-user-info"></div>
            <div class="dropdown-divider"></div>
            <a href="#/orders" class="dropdown-item">Đơn hàng của tôi</a>
            <a href="#/admin" class="dropdown-item" id="dropdown-admin" style="display:none">⚙️ Admin Panel</a>
            <div class="dropdown-divider"></div>
            <button class="dropdown-item text-danger" id="btn-logout">Đăng xuất</button>
          </div>
          <div class="auth-buttons" id="auth-buttons">
            <a href="#/login" class="btn btn-ghost btn-sm">Đăng nhập</a>
            <a href="#/register" class="btn btn-primary btn-sm">Đăng ký</a>
          </div>
        </div>
      </nav>

      <button class="hamburger" id="hamburger" aria-label="Menu">
        <span></span><span></span><span></span>
      </button>
    </div>

    <!-- Mobile nav -->
    <div class="mobile-nav" id="mobile-nav">
      <div class="mobile-search">
        <input type="text" id="mobile-search-input" placeholder="Tìm sản phẩm..." />
      </div>
      <div class="mobile-nav-links" id="mobile-nav-links"></div>
    </div>
  </header>

  <!-- Category sidebar (shown on home/category pages) -->
  <div class="layout">
    <aside class="sidebar" id="sidebar">
      <nav class="sidebar-nav" id="sidebar-nav">
        <div class="sidebar-title">Danh mục</div>
        <!-- Populated by JS -->
      </nav>
    </aside>

    <!-- Main content -->
    <main class="main-content" id="main-content">
      <div id="app-view">
        <!-- Loading -->
        <div class="page-loading" id="page-loading">
          <div class="spinner"></div>
        </div>
      </div>
    </main>
  </div>

  <!-- Toast notifications -->
  <div class="toast-container" id="toast-container"></div>

  <!-- Modal overlay -->
  <div class="modal-overlay" id="modal-overlay" style="display:none">
    <div class="modal" id="modal">
      <button class="modal-close" id="modal-close">✕</button>
      <div class="modal-content" id="modal-content"></div>
    </div>
  </div>

  <!-- Neon Auth SDK -->
  <script src="https://unpkg.com/@neondatabase/neon-auth-js@latest/dist/browser.js"></script>

  <script src="/static/app.js?v={{ js_hash }}"></script>
</body>
</html>
