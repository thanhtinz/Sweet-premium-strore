<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ShopKey — Digital Products</title>
  <meta name="description" content="Mua tài khoản, key, gift card và các sản phẩm số uy tín, giá rẻ" />
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🔑</text></svg>" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/static/styles.css?v={{ css_hash }}" />
</head>
<body>

  <!-- ─── Storefront Shell ─── -->
  <div class="app-shell" id="app-shell">

    <!-- Sidebar -->
    <aside class="sidebar" id="sidebar">
      <a href="#/" class="sidebar-logo">
        <div class="sidebar-logo-icon">🔑</div>
        <div class="sidebar-logo-text">Shop<span>Key</span></div>
      </a>
      <nav class="sidebar-nav" id="sidebar-nav">
        <div class="sidebar-section">Danh mục</div>
        <!-- Populated by JS -->
      </nav>
    </aside>

    <!-- Sidebar overlay (mobile) -->
    <div class="sidebar-overlay" id="sidebar-overlay"></div>

    <!-- Main wrap -->
    <div class="main-wrap">

      <!-- Header -->
      <header class="header" id="header">
        <button class="hamburger-btn" id="hamburger" aria-label="Menu">
          <span></span><span></span><span></span>
        </button>

        <div class="header-search">
          <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
          <input type="text" id="search-input" placeholder="Tìm sản phẩm..." autocomplete="off" />
        </div>

        <div class="header-actions">
          <!-- Cart -->
          <a href="#/cart" class="header-btn" id="nav-cart" title="Giỏ hàng">
            <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="9" cy="21" r="1"/><circle cx="20" cy="21" r="1"/><path d="M1 1h4l2.68 13.39a2 2 0 0 0 2 1.61h9.72a2 2 0 0 0 2-1.61L23 6H6"/></svg>
            <span class="cart-badge" id="cart-count" style="display:none">0</span>
          </a>

          <!-- Orders -->
          <a href="#/orders" class="header-btn" id="nav-orders" title="Đơn hàng">
            <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M6 2 3 6v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2V6l-3-4z"/><line x1="3" y1="6" x2="21" y2="6"/><path d="M16 10a4 4 0 0 1-8 0"/></svg>
          </a>

          <!-- User menu -->
          <div class="user-avatar-btn" id="user-menu-btn" style="display:none">
            <div class="user-avatar" id="user-avatar">👤</div>
            <div class="user-info">
              <div class="user-name" id="user-name">User</div>
              <div class="user-role" id="user-role">Khách hàng</div>
            </div>
            <!-- Dropdown -->
            <div class="dropdown-menu" id="user-dropdown">
              <div class="dropdown-header">
                <div class="user-name" id="dropdown-name">User</div>
                <div class="dropdown-email" id="dropdown-email"></div>
              </div>
              <div class="dropdown-divider"></div>
              <a href="#/orders" class="dropdown-item">📋 Đơn hàng của tôi</a>
              <a href="#/admin" class="dropdown-item" id="dropdown-admin" style="display:none">⚙️ Admin Panel</a>
              <div class="dropdown-divider"></div>
              <button class="dropdown-item danger" id="btn-logout">🚪 Đăng xuất</button>
            </div>
          </div>

          <!-- Auth buttons (not logged in) -->
          <div class="flex gap-6" id="auth-buttons">
            <a href="#/login" class="btn btn-ghost btn-sm">Đăng nhập</a>
            <a href="#/register" class="btn btn-primary btn-sm">Đăng ký</a>
          </div>
        </div>
      </header>

      <!-- Page content -->
      <div class="page-content" id="page-content">
        <div id="app-view">
          <div class="page-loading"><div class="spinner"></div></div>
        </div>
      </div>
    </div>
  </div>

  <!-- ─── Admin Shell (injected by JS) ─── -->

  <!-- ─── Toast ─── -->
  <div class="toast-container" id="toast-container"></div>

  <!-- ─── Modal ─── -->
  <div class="modal-overlay" id="modal-overlay" style="display:none">
    <div class="modal" id="modal">
      <div class="modal-header">
        <div class="modal-title" id="modal-title"></div>
        <button class="modal-close-btn" id="modal-close">✕</button>
      </div>
      <div class="modal-body" id="modal-content"></div>
    </div>
  </div>

  <script src="/static/app.js?v={{ js_hash }}"></script>
</body>
</html>
