<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>{{ title }}</title>
  <meta name="description" content="{{ description }}" />
  <meta property="og:type" content="article" />
  <meta property="og:title" content="{{ title }}" />
  <meta property="og:description" content="{{ description }}" />
  <meta property="og:image" content="{{ image_url }}" />
  <meta property="og:url" content="{{ canonical_url }}" />
  <meta property="og:site_name" content="{{ site_name }}" />
  <meta name="twitter:card" content="summary_large_image" />
  <meta name="twitter:title" content="{{ title }}" />
  <meta name="twitter:description" content="{{ description }}" />
  <meta name="twitter:image" content="{{ image_url }}" />
  <link rel="icon" href="{{ favicon_url }}" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />
  <link rel="stylesheet" href="/static/blog-public.css?v={{ css_hash }}" />
</head>
<body data-blog-slug="{{ blog_slug or '' }}">
  <div id="blog-app" class="blog-app">
    <div class="blog-loading-shell">
      <div class="blog-loading-spinner"></div>
      <div class="blog-loading-text">Đang tải blog...</div>
    </div>
  </div>
  <script>
    window.__BLOG_BOOTSTRAP__ = {
      siteName: {{ site_name|tojson }},
      siteDescription: {{ description|tojson }},
      logoUrl: {{ logo_url|tojson }},
      faviconUrl: {{ favicon_url|tojson }},
      canonicalUrl: {{ canonical_url|tojson }},
      initialSlug: {{ (blog_slug or '')|tojson }},
      copyrightText: {{ (copyright_text or '')|tojson }}
    };
  </script>
  <script src="/static/blog-public.js?v={{ js_hash }}"></script>
</body>
</html>
